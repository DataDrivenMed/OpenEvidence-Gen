<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenEvidence: A Clinical and Strategic Assessment for Academic Medical Practice</title>
<meta name="description" content="A comprehensive clinical and strategic assessment of OpenEvidence: evidence synthesis, failure modes, governance, and deployment considerations for academic medical centers and health systems.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #1a1614;
    --ink-light: #3d3430;
    --ink-faint: #6b5f5a;
    --rule: #c8bfba;
    --rule-light: #e8e2de;
    --paper: #faf7f4;
    --paper-warm: #f5f0eb;
    --accent: #8b1a1a;
    --accent-light: #c0392b;
    --accent-muted: #a0522d;
    --gold: #b8860b;
    --green: #2d5a27;
    --green-light: #e8f5e4;
    --amber: #7a4f00;
    --amber-light: #fef6e4;
    --red-light: #fdf0f0;
    --col-width: 680px;
    --full-width: 1100px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 17px;
    line-height: 1.72;
    color: var(--ink);
    background: var(--paper);
    overflow-x: hidden; /* prevent horizontal scroll on all devices */
    max-width: 100vw;
  }

  /* ── MASTHEAD ── */
  .masthead {
    border-top: 4px solid var(--accent);
    border-bottom: 2px solid var(--ink);
    padding: 0;
    padding-left: 240px;
    text-align: center;
    background: var(--paper);
  }
  .masthead-inner {
    max-width: var(--full-width);
    margin: 0 auto;
    padding: 36px 180px 28px 40px;
  }
  .journal-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 600;
  }
  .report-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1.18;
    color: var(--ink);
    max-width: 780px;
    margin: 0 auto 10px;
  }
  .report-subtitle {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 19px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink-faint);
    margin-bottom: 26px;
  }
  .meta-row {
    font-size: 13px;
    color: var(--ink-faint);
    border-top: 1px solid var(--rule);
    padding-top: 14px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0 28px;
  }
  .meta-row span { white-space: nowrap; }
  .meta-row .dot { color: var(--rule); }

  /* ─────────────────────────────────────────
     LAYOUT: fixed sidebar + scrolling main
     ───────────────────────────────────────── */

  /* The fixed sidebar sits outside normal flow */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    overflow-y: auto;
    background: var(--paper);
    border-right: 1px solid var(--rule);
    z-index: 200;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .sidebar-inner {
    padding: 24px 16px 80px 20px;
    flex: 1;
  }

  /* Reading progress bar pinned at top of sidebar */
  .reading-progress {
    height: 3px;
    background: var(--rule-light);
    flex-shrink: 0;
  }
  .reading-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s linear;
  }

  /* Page shell: just a centering wrapper — sidebar is outside it */
  .page-shell {
    /* Leave 240px on the left for the fixed sidebar */
    margin-left: 240px;
    padding: 0;
  }

  /* Main content: centered within the remaining space */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 50px 40px 80px 40px;
  }

  /* Masthead: offset to clear the fixed sidebar — padding merged above */
  .toc-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    font-family: 'Playfair Display', serif;
  }
  .toc-list { list-style: none; }
  .toc-list li { margin-bottom: 3px; }
  .toc-list a {
    display: block;
    font-size: 12.5px;
    color: var(--ink-light);
    text-decoration: none;
    padding: 4px 8px 4px 0;
    border-left: 2px solid transparent;
    line-height: 1.4;
    transition: all 0.15s;
  }
  .toc-list a:hover, .toc-list a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    padding-left: 8px;
  }
  .toc-sub a { font-size: 11.5px; color: var(--ink-faint); padding-left: 14px; }
  .toc-sub a:hover { padding-left: 22px; }

  /* ── MAIN CONTENT ── */
  /* ── ABSTRACT ── */
  .abstract-box {
    background: var(--paper-warm);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    padding: 26px 30px;
    margin-bottom: 44px;
    font-size: 15.5px;
    line-height: 1.7;
  }
  .abstract-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .keywords {
    margin-top: 14px;
    font-size: 13px;
    color: var(--ink-faint);
  }
  .keywords strong { color: var(--ink-light); }

  /* ── SECTIONS ── */
  section { margin-bottom: 56px; }
  section:last-child { margin-bottom: 0; }

  .section-header {
    border-top: 2px solid var(--ink);
    padding-top: 20px;
    margin-bottom: 28px;
  }
  .section-number {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    display: block;
    margin-bottom: 5px;
  }
  .section-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--ink);
  }

  h3 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin: 32px 0 12px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--rule-light);
  }
  h4 {
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink-light);
    margin: 22px 0 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 12px;
  }

  p { margin-bottom: 16px; }
  p:last-child { margin-bottom: 0; }

  strong { font-weight: 600; color: var(--ink); }
  em { font-style: italic; }

  /* ── CALLOUTS ── */
  .callout {
    border-left: 3px solid var(--rule);
    padding: 18px 22px;
    margin: 28px 0;
    font-size: 15.5px;
    background: var(--paper-warm);
  }
  .callout.warning {
    border-color: var(--accent);
    background: var(--red-light);
  }
  .callout.note {
    border-color: var(--gold);
    background: var(--amber-light);
  }
  .callout.positive {
    border-color: var(--green);
    background: var(--green-light);
  }
  .callout-head {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .callout.warning .callout-head { color: var(--accent); }
  .callout.note .callout-head { color: var(--amber); }
  .callout.positive .callout-head { color: var(--green); }

  /* ── TABLES ── */
  .table-wrap {
    overflow-x: auto;
    margin: 24px 0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead th {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 14px;
    text-align: left;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  tbody tr { border-bottom: 1px solid var(--rule-light); }
  tbody tr:hover { background: var(--paper-warm); }
  td { padding: 10px 14px; vertical-align: top; line-height: 1.5; }
  .table-caption {
    font-size: 12.5px;
    color: var(--ink-faint);
    font-style: italic;
    text-align: center;
    margin-top: 8px;
  }

  /* ── BADGE/TAG ── */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .badge-red { background: #fde8e8; color: #8b1a1a; }
  .badge-amber { background: #fef3d8; color: #7a4f00; }
  .badge-green { background: #e4f4e0; color: #2d5a27; }
  .badge-gray { background: #ece8e4; color: #5a4f4a; }
  .badge-blue { background: #e6edf8; color: #1a3a6b; }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
    margin: 24px 0;
  }
  .stat-card {
    border: 1px solid var(--rule);
    padding: 18px 16px;
    background: var(--paper);
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 12px;
    color: var(--ink-faint);
    line-height: 1.4;
  }
  .stat-date {
    font-size: 11px;
    color: var(--rule);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── CHART CONTAINERS ── */
  .chart-block {
    margin: 28px 0;
    padding: 24px;
    border: 1px solid var(--rule);
    background: var(--paper);
  }
  .chart-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--ink);
  }
  canvas { max-width: 100%; }

  /* ── FIGURE / CHART ── */
  .fig-caption {
    font-size: 12.5px;
    color: var(--ink-faint);
    font-style: italic;
    margin-top: 10px;
    border-top: 1px solid var(--rule-light);
    padding-top: 8px;
  }
  .fig-num {
    font-style: normal;
    font-weight: 600;
    color: var(--ink-light);
  }

  /* ── FOOTNOTES / GAPS ── */
  .gap-flag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #fff8e1;
    border: 1px solid #f0c050;
    border-radius: 2px;
    padding: 3px 8px;
    font-size: 11.5px;
    color: #7a5c00;
    font-family: 'JetBrains Mono', monospace;
    vertical-align: middle;
  }

  /* ── PRODUCT TIMELINE ── */
  .timeline { position: relative; padding-left: 20px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--rule);
  }
  .tl-item {
    position: relative;
    margin-bottom: 20px;
    padding-left: 22px;
  }
  .tl-item::before {
    content: '';
    position: absolute;
    left: -14px;
    top: 7px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--paper);
    outline: 1px solid var(--accent);
  }
  .tl-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .tl-title {
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .tl-body { font-size: 13.5px; color: var(--ink-light); line-height: 1.5; }

  /* ── FUNDING TABLE ── */
  .funding-bar { height: 8px; background: var(--rule-light); position: relative; border-radius: 2px; }
  .funding-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── PULL QUOTE ── */
  blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 20px;
    margin: 24px 0;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-style: italic;
    color: var(--ink-light);
  }
  blockquote cite {
    display: block;
    font-size: 12px;
    font-style: normal;
    color: var(--ink-faint);
    margin-top: 8px;
    font-family: 'Source Serif 4', serif;
  }

  /* ── ACCORDION ── */
  .accordion { border: 1px solid var(--rule); margin: 12px 0; }
  .accordion-btn {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 15px;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }
  .accordion-btn:hover { background: var(--paper-warm); }
  .accordion-btn.open { border-bottom-color: var(--rule); background: var(--paper-warm); }
  .accordion-btn .chevron {
    font-size: 12px;
    color: var(--ink-faint);
    transform: rotate(0deg);
    transition: transform 0.2s;
  }
  .accordion-btn.open .chevron { transform: rotate(180deg); }
  .accordion-body { padding: 16px 18px; font-size: 14.5px; display: none; }
  .accordion-body.open { display: block; }

  /* ── SYSTEM COMPARISON TABS ── */
  .tabs { margin: 24px 0; }
  .tab-buttons { display: flex; border-bottom: 2px solid var(--rule); gap: 0; }
  .tab-btn {
    background: none;
    border: none;
    padding: 10px 18px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--ink-faint);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .tab-panel { display: none; padding: 20px 0; }
  .tab-panel.active { display: block; }

  /* ── PERFORMANCE BARS ── */
  .perf-list { list-style: none; }
  .perf-item { margin-bottom: 14px; }
  .perf-label { font-size: 13px; color: var(--ink-light); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .perf-track { height: 10px; background: var(--rule-light); border-radius: 2px; }
  .perf-bar { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .perf-bar.good { background: var(--green); }
  .perf-bar.mid { background: var(--gold); }
  .perf-bar.low { background: var(--accent); }

  /* ── RISK MATRIX ── */
  .risk-matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .risk-cell {
    padding: 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .risk-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; font-family: 'JetBrains Mono', monospace; }

  /* ── SECTION SUMMARY CARD ── */
  .section-summary {
    background: linear-gradient(135deg, #1a1614 0%, #2d2420 100%);
    color: var(--paper);
    padding: 24px 28px;
    margin-bottom: 32px;
    border-radius: 0;
    position: relative;
    overflow: hidden;
  }
  .section-summary::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 120px; height: 120px;
    background: var(--accent);
    opacity: 0.08;
    border-radius: 50%;
    transform: translate(40px, -40px);
  }
  .summary-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .summary-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--accent);
    opacity: 0.4;
  }
  .summary-headline {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .summary-cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 14px;
  }
  .summary-col-head {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  .summary-col-head.positive { color: #7ecf78; }
  .summary-col-head.negative { color: #f0a0a0; }
  .summary-col-head.action { color: #f0d080; }
  .summary-col ul { list-style: none; padding: 0; }
  .summary-col li {
    font-size: 13px;
    line-height: 1.5;
    color: #e8e2de;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 7px;
  }
  .summary-col li::before { flex-shrink: 0; opacity: 0.8; }
  .summary-col.positive li::before { content: '↑'; color: #7ecf78; }
  .summary-col.negative li::before { content: '↓'; color: #f0a0a0; }
  .summary-col.action li::before { content: '→'; color: #f0d080; }
  @media (max-width: 700px) {
    .summary-cols { grid-template-columns: 1fr; }
  }

  /* ── AI EVAL GUIDE ── */
  .eval-hero {
    background: var(--ink);
    color: var(--paper);
    padding: 36px 32px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .eval-hero::after {
    content: 'EVAL';
    position: absolute;
    right: -20px; top: -20px;
    font-size: 120px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: rgba(139,26,26,0.15);
    line-height: 1;
  }
  .eval-q {
    border: 1px solid var(--rule);
    margin: 20px 0;
  }
  .eval-q-head {
    background: var(--paper-warm);
    padding: 16px 20px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .eval-q-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    flex-shrink: 0;
  }
  .eval-q-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
  }
  .eval-q-subtitle { font-size: 12.5px; color: var(--ink-faint); margin-top: 3px; }
  .eval-q-body { padding: 20px; font-size: 14.5px; line-height: 1.7; }
  .scenario-box {
    background: #1a1614;
    color: #e8e2de;
    padding: 20px 22px;
    margin: 16px 0;
    font-size: 14px;
    line-height: 1.7;
    border-left: 3px solid var(--accent);
  }
  .scenario-box strong { color: #fff; }
  .scenario-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .kill-list {
    background: var(--red-light);
    border: 1px solid #e8a0a0;
    padding: 16px 20px;
    margin: 14px 0;
    font-size: 14px;
  }
  .kill-list-head {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .kill-list ul { list-style: none; padding: 0; }
  .kill-list li { padding: 4px 0; display: flex; gap: 8px; }
  .kill-list li::before { content: '✗'; color: var(--accent); flex-shrink: 0; }
  .scorecard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .scorecard-item {
    border: 1px solid var(--rule);
    padding: 14px 16px;
    background: var(--paper-warm);
